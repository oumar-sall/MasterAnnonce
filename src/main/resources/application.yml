server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: master-annonce-service

  # Configuration de la base de données
  datasource:
    url: jdbc:postgresql://localhost:5432/MasterAnnonce
    username: postgres
    password: B641656u
    driver-class-name: org.postgresql.Driver

  # Configuration JPA / Hibernate
  jpa:
    hibernate:
      # 'update' crée les tables si elles n'existent pas ou les modifie
      ddl-auto: update
    show-sql: true # Affiche les requêtes SQL dans la console (indispensable en débug)
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Configuration des logs pour voir ce que Spring fait au démarrage
logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG